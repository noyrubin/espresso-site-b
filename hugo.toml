baseURL = "https://myhomebarista.com"
languageCode = "en-us"
title = "Barista At Home"
theme = "PaperMod"

[params]
  description = "Home barista guides, espresso machine reviews, and coffee brewing techniques"
  author = "Barista At Home"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  defaultTheme = "light"

[params.homeInfoParams]
  Title = "Your Home Espresso Journey Starts Here"
  Content = "Expert guides to help you brew cafe-quality espresso at home. Equipment recommendations, brewing technique, drink recipes, and troubleshooting — everything a home barista needs."

[[params.socialIcons]]
  name = "rss"
  url = "/index.xml"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[[menus.main]]
  identifier = "guides"
  name = "Guides"
  url = "/guides/"
  weight = 10

[[menus.main]]
  identifier = "reviews"
  name = "Reviews"
  url = "/reviews/"
  weight = 20

[[menus.main]]
  identifier = "recipes"
  name = "Recipes"
  url = "/recipes/"
  weight = 30

[[menus.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 40

[taxonomies]
  category = "categories"
  tag = "tags"

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[markup.goldmark.renderer]
  unsafe = true

[services.googleAnalytics]
  ID = "G-3J5BFBZ6FG"
